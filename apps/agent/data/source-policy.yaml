version: 1
updated: "2026-06-02"

pipeline_defaults:
  x_stonks:
    list_url: "https://x.com/i/lists/1988527303635411209"
    max_results: 60
  reddit_retail:
    subreddits:
      - wallstreetbets
      - stocks
      - investing
    limit_per_subreddit: 15
    extra_terms:
      - AI
      - HBM
      - semiconductors
      - memory
      - SOX
      - Korea
  citrini_substack:
    query: "site:citriniresearch.com OR site:citriniresearch.substack.com Citrini Research AI semiconductors supply chain"
    max_articles: 3
  especialistas_citrini:
    handles:
      - citrini
      - zephyr_z9
      - jukan05
    max_pages: 1
    workers: 3
  x_search:
    # Busqueda de X por keyword/topic (tools/scripts/x_search_fetch.py). On-demand,
    # no obligatoria. El agente la usa para CONTRASTAR (noticias, cuando lo considere)
    # y al ANALIZAR UNA ACCION. sort Latest = ultimo minuto; Top = relevancia/sentimiento.
    actor: "kaitoeasyapi/twitter-x-data-tweet-scraper-pay-per-result-cheapest"
    sort_default: "Latest"
    max_results: 30

request_types:
  briefing_completo:
    description: "Briefing de mercado completo US / informativo / cierre / que pasa hoy."
    trigger_terms:
      - "briefing completo"
      - "briefing v"
      - "briefing us"
      - "briefing de mercado"
      - "cierre us"
      - "mercado hoy"
      - "que pasa hoy"
      - "qué pasa hoy"
      - "informativo"
    required_groups:
      - portfolio_step0
      - carpatos
      - sectorial_us
      - cross_asset
      - news_tickers
      - x_stonks
      - reddit_retail
    require_any:
      especialistas_citrini:
        min: 1
        within_hours: 24
        groups:
          - citrini_substack
          - citrini_x
          - zephyr_z9
          - jukan05
    # Fuentes disponibles pero NO obligatorias (no bloquean el gate). El agente las
    # usa cuando aportan: contraste de una noticia, sentimiento, analisis de una accion.
    optional_groups:
      - x_search

